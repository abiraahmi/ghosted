url: https://abiraahmi.github.io/ghosted

template:
  logo: man/figures/sticker.png
  bootstrap: 5
  includes:
    in_header: |
      <link rel="icon" type="image/png" href="reference/figures/sticker.png">
      <style>
        .navbar {
          background-color: #330662 !important;
        }
        .navbar-dark .navbar-nav .nav-link {
          color: rgba(255, 255, 255, 0.85);
        }
        .navbar-dark .navbar-nav .nav-link:hover {
          color: rgba(255, 255, 255, 1);
        }
      </style>
  opengraph:
    image:
      src: reference/figures/sticker.png
      alt: "ghosted package hex sticker"
  params:
    bootswatch: flatly
    logo: reference/figures/sticker.png

build:
  vignettes: true

reference:
  - title: Core functions
    contents:
      - ghost_vtt
      - ghost_docx
      - ghost_txt
      - ghost_batch

navbar:
  structure:
    left: [home, reference, articles]
    right: [github]

  components:
    articles:
      text: Articles
      menu:
        - text: Getting Started
          href: articles/getting-started.html

    github:
      icon: fa-github fa-lg
      href: https://github.com/abiraahmi/ghosted
      aria-label: "GitHub repository"
